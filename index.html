<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>NI Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
background:#0f172a;
color:white;
font-family:Arial;
padding:20px;
}

canvas{
background:#1e293b;
margin-bottom:40px;
}

</style>

</head>

<body>

<h2>AI0</h2>
<canvas id="chart0"></canvas>

<h2>AI1</h2>
<canvas id="chart1"></canvas>

<h2>AI2</h2>
<canvas id="chart2"></canvas>

<script>

const WS="wss://ni-live-monitor.yanovichvitaliy.workers.dev/ws"

const MAX_POINTS=500

function createChart(id){

return new Chart(document.getElementById(id),{

type:"line",

data:{
labels:[],
datasets:[

{
label:"mean",
data:[],
borderColor:"#22c55e",
fill:false
},

{
label:"max",
data:[],
borderColor:"rgba(0,0,0,0)",
backgroundColor:"rgba(34,197,94,0.2)",
fill:"+1"
},

{
label:"min",
data:[],
borderColor:"rgba(0,0,0,0)",
fill:false
}

]
},

options:{
animation:false,
responsive:true
}

})

}

const chart0=createChart("chart0")
const chart1=createChart("chart1")
const chart2=createChart("chart2")


function push(chart,time,mean,min,max){

chart.data.labels.push(time)

chart.data.datasets[0].data.push(mean)
chart.data.datasets[1].data.push(max)
chart.data.datasets[2].data.push(min)

if(chart.data.labels.length>MAX_POINTS){

chart.data.labels.shift()

chart.data.datasets.forEach(d=>d.data.shift())

}

chart.update()

}


function save(){

localStorage.setItem("niCharts",JSON.stringify({

c0:chart0.data,
c1:chart1.data,
c2:chart2.data

}))

}


function load(){

const s=localStorage.getItem("niCharts")

if(!s)return

const d=JSON.parse(s)

chart0.data=d.c0
chart1.data=d.c1
chart2.data=d.c2

chart0.update()
chart1.update()
chart2.update()

}

load()


const ws=new WebSocket(WS)

ws.onmessage=e=>{

const msg=JSON.parse(e.data)

const p=msg.data

if(!p)return

const t=p.updated_at

push(chart0,t,p.channels.ai0.mean,p.channels.ai0.min,p.channels.ai0.max)

push(chart1,t,p.channels.ai1.mean,p.channels.ai1.min,p.channels.ai1.max)

push(chart2,t,p.channels.ai2.mean,p.channels.ai2.min,p.channels.ai2.max)

save()

}

</script>

</body>
</html>
