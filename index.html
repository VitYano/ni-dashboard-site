<!doctype html>
<html lang="uk">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>NI Strain Dashboard</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/echarts-gl@2/dist/echarts-gl.min.js"></script>

  <style>
    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
    }

    body {
      padding: 10px;
    }

    .app {
      display: grid;
      grid-template-rows: auto auto auto auto;
      gap: 10px;
      min-height: calc(100vh - 20px);
    }

    h1 {
      margin: 0;
      font-size: 22px;
      line-height: 1.2;
    }

    .section-title {
      margin: 6px 0 0 0;
      font-size: 18px;
      line-height: 1.2;
      color: #cbd5e1;
    }

    .status-bar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.08);
      font-weight: 700;
      font-size: 13px;
    }

    .dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: #fbbf24;
    }

    .ok { background: #22c55e; }
    .bad { background: #ef4444; }

    .charts,
    .rainflow-grid {
      min-height: 0;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    .card {
      min-height: 0;
      display: grid;
      grid-template-rows: auto auto 1fr auto;
      background: #1e293b;
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 12px;
      padding: 10px;
      height: 350px;
    }

    .rf-card {
      min-height: 0;
      display: grid;
      grid-template-rows: auto auto 1fr auto;
      background: #1e293b;
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 12px;
      padding: 10px;
      height: 420px;
    }

    .chart-title {
      margin: 0 0 6px 0;
      font-size: 18px;
      line-height: 1.2;
    }

    .stats {
      margin: 0 0 6px 0;
      color: #94a3b8;
      font-size: 12px;
      line-height: 1.3;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .canvas-wrap,
    .plot-wrap {
      min-height: 0;
      position: relative;
    }

    .canvas-wrap canvas,
    .plot-wrap > div {
      width: 100% !important;
      height: 100% !important;
      display: block;
    }

    .card-actions {
      margin-top: 8px;
      display: flex;
      justify-content: flex-end;
      gap: 8px;
    }

    .download-btn {
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.12);
      color: #e2e8f0;
      border-radius: 8px;
      padding: 6px 10px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
    }

    .download-btn:hover {
      background: rgba(255,255,255,.12);
    }

    @media (max-width: 1400px) {
      .charts,
      .rainflow-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 900px) {
      .charts,
      .rainflow-grid {
        grid-template-columns: 1fr;
      }

      .card,
      .rf-card {
        height: 340px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <h1>NI Strain Dashboard</h1>

    <div class="status-bar">
      <div class="pill">
        <span id="dot" class="dot"></span>
        <span id="statusText">CONNECTING...</span>
      </div>
      <div class="pill">Run: <span id="runIdText">--</span></div>
      <div class="pill">File: <span id="fileNameText">--</span></div>
      <div class="pill">Unit: <span id="unitText">µε</span></div>
      <div class="pill">Vex: <span id="vexText">--</span> V</div>
      <div class="pill">Updated: <span id="updatedAt">--</span></div>
      <div class="pill">Age: <span id="ageSec">--</span>s</div>
      <div class="pill">Rainflow: <span id="rainflowElapsedText">--</span></div>
    </div>

    <h2 class="section-title">Live strain</h2>
    <div class="charts" id="charts"></div>

    <h2 class="section-title">Accumulated rainflow matrix</h2>
    <div class="rainflow-grid" id="rainflowGrid"></div>
  </div>

  <script>
    const API_BASE = "https://ni-live-monitor.yanovichvitaliy.workers.dev";
    const WS_URL = "wss://ni-live-monitor.yanovichvitaliy.workers.dev/ws";
    const MAX_POINTS = 1000;
    const CHANNEL_KEYS = ["ai0", "ai1", "ai2", "ai3"];

    const dot = document.getElementById("dot");
    const statusText = document.getElementById("statusText");
    const runIdText = document.getElementById("runIdText");
    const fileNameText = document.getElementById("fileNameText");
    const unitText = document.getElementById("unitText");
    const vexText = document.getElementById("vexText");
    const updatedAt = document.getElementById("updatedAt");
    const ageSec = document.getElementById("ageSec");
    const rainflowElapsedText = document.getElementById("rainflowElapsedText");
    const chartsEl = document.getElementById("charts");
    const rainflowGridEl = document.getElementById("rainflowGrid");

    let activeRunId = null;
    let runStartMs = null;
    let lastUpdatedAtMs = null;
    let latestRainflowPayload = null;

    const statsEls = {};
    const charts = {};
    const rainflowCharts = {};

    function setStatus(text, mode) {
      statusText.textContent = text;
      dot.className = "dot " + (mode === "ok" ? "ok" : mode === "bad" ? "bad" : "");
    }

    function fmt(value) {
      const n = Number(value);
      return Number.isFinite(n) ? n.toFixed(3) : "--";
    }

    function getTimeAxisLabel(maxSeconds) {
      if (maxSeconds >= 3600) return "t (h)";
      if (maxSeconds >= 60) return "t (min)";
      return "t (s)";
    }

    function formatTimeTick(value) {
      const v = Number(value);

      if (v >= 3600) {
        const h = v / 3600;
        return (Number.isInteger(h) ? h.toFixed(0) : h.toFixed(1)) + " h";
      }

      if (v >= 60) {
        const m = v / 60;
        return (Number.isInteger(m) ? m.toFixed(0) : m.toFixed(1)) + " min";
      }

      return v.toFixed(0) + " s";
    }

    function formatElapsed(seconds) {
      const s = Number(seconds);
      if (!Number.isFinite(s)) return "--";
      return formatTimeTick(s);
    }

    function downloadTextFile(filename, content, contentType = "text/csv;charset=utf-8;") {
      const blob = new Blob([content], { type: contentType });
      const url = URL.createObjectURL(blob);

      const a = document.createElement("a");
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      a.remove();

      URL.revokeObjectURL(url);
    }

    function buildWideCsv() {
      const meanSeries = {};

      for (const key of CHANNEL_KEYS) {
        const chart = charts[key];
        meanSeries[key] = chart ? chart.data.datasets[0].data : [];
      }

      const timeMap = new Map();

      for (const key of CHANNEL_KEYS) {
        for (const point of meanSeries[key]) {
          if (!point || !Number.isFinite(point.x)) continue;

          const t = Number(point.x).toFixed(3);

          if (!timeMap.has(t)) {
            timeMap.set(t, {
              t,
              ai0: "",
              ai1: "",
              ai2: "",
              ai3: ""
            });
          }

          timeMap.get(t)[key] = Number(point.y).toFixed(3);
        }
      }

      const rows = [];
      rows.push(["t", "ai0", "ai1", "ai2", "ai3"]);

      const sorted = Array.from(timeMap.values()).sort((a, b) => Number(a.t) - Number(b.t));

      for (const row of sorted) {
        rows.push([row.t, row.ai0, row.ai1, row.ai2, row.ai3]);
      }

      return rows.map(row => row.join(";")).join("\n");
    }

    function buildRainflowCsv(channelKey) {
      if (!latestRainflowPayload || !latestRainflowPayload.channels) return null;

      const channel = latestRainflowPayload.channels[channelKey];
      if (!channel || !channel.range_bins?.length || !channel.mean_bins?.length || !channel.matrix?.length) {
        return null;
      }

      const rows = [];
      rows.push(["mean_bin \\ range_bin", ...channel.range_bins.map(v => Number(v).toFixed(6))]);

      for (let yi = 0; yi < channel.mean_bins.length; yi++) {
        const row = [Number(channel.mean_bins[yi]).toFixed(6)];
        for (let xi = 0; xi < channel.range_bins.length; xi++) {
          row.push(String(Number(channel.matrix[yi]?.[xi] ?? 0)));
        }
        rows.push(row);
      }

      return rows.map(row => row.join(";")).join("\n");
    }

    function downloadWideCsv() {
      const csv = buildWideCsv();
      const runId = activeRunId || "no_run";
      downloadTextFile(`strain_${runId}.csv`, csv);
    }

    function downloadRainflowCsv(channelKey) {
      const csv = buildRainflowCsv(channelKey);
      if (!csv) return;

      const runId = activeRunId || "no_run";
      downloadTextFile(`rainflow_${channelKey}_${runId}.csv`, csv);
    }

    function makeCard(channelKey) {
      const upper = channelKey.toUpperCase();

      const card = document.createElement("div");
      card.className = "card";

      const title = document.createElement("h2");
      title.className = "chart-title";
      title.textContent = upper;

      const stats = document.createElement("div");
      stats.className = "stats";
      stats.id = `stats-${channelKey}`;
      stats.textContent = "mean -- | min -- | max --";

      const wrap = document.createElement("div");
      wrap.className = "canvas-wrap";

      const canvas = document.createElement("canvas");
      canvas.id = `chart-${channelKey}`;

      wrap.appendChild(canvas);

      const actions = document.createElement("div");
      actions.className = "card-actions";

      const button = document.createElement("button");
      button.type = "button";
      button.className = "download-btn";
      button.textContent = "Download";
      button.addEventListener("click", downloadWideCsv);

      actions.appendChild(button);

      card.appendChild(title);
      card.appendChild(stats);
      card.appendChild(wrap);
      card.appendChild(actions);
      chartsEl.appendChild(card);

      statsEls[channelKey] = stats;
      charts[channelKey] = makeChart(canvas.id, upper);
    }

    function makeRainflowCard(channelKey) {
      const upper = channelKey.toUpperCase();

      const card = document.createElement("div");
      card.className = "rf-card";

      const title = document.createElement("h2");
      title.className = "chart-title";
      title.textContent = upper + " rainflow";

      const stats = document.createElement("div");
      stats.className = "stats";
      stats.id = `rainflow-stats-${channelKey}`;
      stats.textContent = "range -- | mean -- | cycles --";

      const wrap = document.createElement("div");
      wrap.className = "plot-wrap";

      const plot = document.createElement("div");
      plot.id = `rainflow-${channelKey}`;

      wrap.appendChild(plot);

      const actions = document.createElement("div");
      actions.className = "card-actions";

      const button = document.createElement("button");
      button.type = "button";
      button.className = "download-btn";
      button.textContent = "Download";
      button.addEventListener("click", () => downloadRainflowCsv(channelKey));

      actions.appendChild(button);

      card.appendChild(title);
      card.appendChild(stats);
      card.appendChild(wrap);
      card.appendChild(actions);
      rainflowGridEl.appendChild(card);
    }

    function makeChart(canvasId, label) {
      const ctx = document.getElementById(canvasId).getContext("2d");

      return new Chart(ctx, {
        type: "line",
        data: {
          datasets: [
            {
              label: label + " mean",
              data: [],
              borderColor: "#22c55e",
              backgroundColor: "#22c55e",
              borderWidth: 2,
              pointRadius: 0,
              pointHoverRadius: 3,
              tension: 0.15,
              fill: false,
              order: 3
            },
            {
              label: label + " max",
              data: [],
              borderColor: "rgba(239,68,68,0)",
              backgroundColor: "rgba(255,120,120,0.30)",
              borderWidth: 0,
              pointRadius: 0,
              pointHoverRadius: 0,
              tension: 0.15,
              fill: { target: 0 },
              order: 1
            },
            {
              label: label + " min",
              data: [],
              borderColor: "rgba(59,130,246,0)",
              backgroundColor: "rgba(59,130,246,0.22)",
              borderWidth: 0,
              pointRadius: 0,
              pointHoverRadius: 0,
              tension: 0.15,
              fill: { target: 0 },
              order: 1
            }
          ]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          animation: false,
          parsing: false,
          normalized: true,
          interaction: {
            mode: "index",
            intersect: false
          },
          scales: {
            x: {
              type: "linear",
              title: { display: true, text: "t (s)" },
              ticks: {
                color: "#cbd5e1",
                maxTicksLimit: 6,
                callback(value) {
                  return formatTimeTick(value);
                }
              },
              grid: { color: "rgba(255,255,255,0.08)" }
            },
            y: {
              title: { display: true, text: "µε" },
              ticks: { color: "#cbd5e1", maxTicksLimit: 6 },
              grid: { color: "rgba(255,255,255,0.08)" }
            }
          },
          plugins: {
            legend: {
              labels: {
                color: "#e2e8f0",
                boxWidth: 12,
                font: { size: 11 }
              }
            },
            tooltip: {
              callbacks: {
                title(items) {
                  if (!items || !items.length) return "";
                  return "t: " + formatTimeTick(items[0].parsed.x);
                },
                label(context) {
                  const y = Number(context.parsed.y).toFixed(3);
                  if (context.datasetIndex === 0) return `${label} mean: ${y}`;
                  if (context.datasetIndex === 1) return `${label} max: ${y}`;
                  if (context.datasetIndex === 2) return `${label} min: ${y}`;
                  return null;
                }
              }
            }
          }
        }
      });
    }

    function clearChart(chart) {
      chart.data.datasets.forEach(ds => ds.data = []);
      chart.options.scales.x.title.text = "t (s)";
      chart.update("none");
    }

    function clearAllCharts() {
      for (const key of CHANNEL_KEYS) {
        clearChart(charts[key]);
      }
    }

    function resetStatsText() {
      for (const key of CHANNEL_KEYS) {
        statsEls[key].textContent = "mean -- | min -- | max --";
      }
    }

    function switchToRun(payload) {
      activeRunId = payload.run_id || null;
      runStartMs = payload.run_started_at ? Date.parse(payload.run_started_at) : null;

      runIdText.textContent = activeRunId || "--";
      fileNameText.textContent = payload.file_name || "--";
      unitText.textContent = payload.unit || "µε";
      vexText.textContent = Number.isFinite(Number(payload.vex_value)) ? String(payload.vex_value) : "--";
      updatedAt.textContent = payload.updated_at || "--";
      ageSec.textContent = "0";
      lastUpdatedAtMs = null;
      rainflowElapsedText.textContent = "--";

      clearAllCharts();
      resetStatsText();
    }

    function appendPoint(chart, x, mean, min, max) {
      const dsMean = chart.data.datasets[0].data;
      const dsMax = chart.data.datasets[1].data;
      const dsMin = chart.data.datasets[2].data;

      const lastMean = dsMean.length ? dsMean[dsMean.length - 1] : null;
      if (lastMean && lastMean.x === x) return;

      dsMean.push({ x, y: mean });
      dsMax.push({ x, y: max });
      dsMin.push({ x, y: min });

      if (dsMean.length > MAX_POINTS) {
        dsMean.splice(0, dsMean.length - MAX_POINTS);
        dsMax.splice(0, dsMax.length - MAX_POINTS);
        dsMin.splice(0, dsMin.length - MAX_POINTS);
      }

      const maxX = dsMean.length ? Number(dsMean[dsMean.length - 1].x) : 0;
      chart.options.scales.x.title.text = getTimeAxisLabel(maxX);

      chart.update("none");
    }

    function applyPayload(payload) {
      if (!payload || !payload.channels) return;

      if (!activeRunId || payload.run_id !== activeRunId) {
        switchToRun(payload);
      }

      if (!runStartMs && payload.run_started_at) {
        runStartMs = Date.parse(payload.run_started_at);
      }

      const ts = payload._received_at || payload.updated_at || null;
      if (!ts) return;

      const ms = Date.parse(ts);
      if (!Number.isFinite(ms)) return;

      lastUpdatedAtMs = ms;
      updatedAt.textContent = ts;
      runIdText.textContent = payload.run_id || "--";
      fileNameText.textContent = payload.file_name || "--";
      unitText.textContent = payload.unit || "µε";
      vexText.textContent = Number.isFinite(Number(payload.vex_value)) ? String(payload.vex_value) : "--";

      const x = runStartMs ? ((ms - runStartMs) / 1000.0) : (ms / 1000.0);

      for (const key of CHANNEL_KEYS) {
        const channel = payload.channels[key];
        if (!channel) continue;

        statsEls[key].textContent =
          `mean ${fmt(channel.mean)} | min ${fmt(channel.min)} | max ${fmt(channel.max)}`;

        appendPoint(
          charts[key],
          x,
          Number(channel.mean),
          Number(channel.min),
          Number(channel.max)
        );
      }
    }

    function renderRainflowChart(channelKey, payload) {
      const el = document.getElementById(`rainflow-${channelKey}`);
      const statsEl = document.getElementById(`rainflow-stats-${channelKey}`);

      if (!el) return;

      if (!payload || !payload.range_bins?.length || !payload.mean_bins?.length || !payload.matrix?.length) {
        if (statsEl) statsEl.textContent = "range -- | mean -- | cycles --";
        const old = echarts.getInstanceByDom(el);
        if (old) old.clear();
        return;
      }

      const rangeBins = payload.range_bins.map(Number);
      const meanBins = payload.mean_bins.map(Number);
      const matrix = payload.matrix.map(row => row.map(Number));

      let totalCycles = 0;
      let maxCount = 0;
      const data = [];

      for (let yi = 0; yi < meanBins.length; yi++) {
        for (let xi = 0; xi < rangeBins.length; xi++) {
          const count = Number(matrix[yi]?.[xi] ?? 0);
          totalCycles += count;
          if (count > maxCount) maxCount = count;
          data.push([rangeBins[xi], meanBins[yi], count]);
        }
      }

      const rangeMin = rangeBins[0];
      const rangeMax = rangeBins[rangeBins.length - 1];
      const meanMin = meanBins[0];
      const meanMax = meanBins[meanBins.length - 1];

      if (statsEl) {
        statsEl.textContent =
          `range ${fmt(rangeMin)} .. ${fmt(rangeMax)} | mean ${fmt(meanMin)} .. ${fmt(meanMax)} | cycles ${fmt(totalCycles)}`;
      }

      let xStep = 1;
      let yStep = 1;

      if (rangeBins.length > 1) {
        xStep = Math.abs(rangeBins[1] - rangeBins[0]);
      }
      if (meanBins.length > 1) {
        yStep = Math.abs(meanBins[1] - meanBins[0]);
      }

      const chart = echarts.getInstanceByDom(el) || echarts.init(el);
      rainflowCharts[channelKey] = chart;

      chart.setOption({
        backgroundColor: "transparent",
        tooltip: {
          formatter: (params) => {
            const [rangeVal, meanVal, countVal] = params.data;
            return [
              `${channelKey.toUpperCase()} rainflow`,
              `Range: ${fmt(rangeVal)} µε`,
              `Mean: ${fmt(meanVal)} µε`,
              `Count: ${fmt(countVal)}`
            ].join("<br>");
          }
        },
        visualMap: {
          min: 0,
          max: Math.max(maxCount, 1),
          calculable: true,
          realtime: false,
          orient: "vertical",
          right: 0,
          top: "middle",
          textStyle: {
            color: "#e2e8f0"
          },
          inRange: {
            color: ["#440154", "#31688e", "#35b779", "#fde725"]
          }
        },
        xAxis3D: {
          type: "value",
          name: "Range (µε)",
          min: rangeMin - xStep / 2,
          max: rangeMax + xStep / 2,
          nameTextStyle: { color: "#e2e8f0" },
          axisLabel: { color: "#cbd5e1" },
          axisLine: { lineStyle: { color: "#64748b" } },
          splitLine: { lineStyle: { color: "rgba(255,255,255,0.08)" } }
        },
        yAxis3D: {
          type: "value",
          name: "Mean (µε)",
          min: meanMin - yStep / 2,
          max: meanMax + yStep / 2,
          nameTextStyle: { color: "#e2e8f0" },
          axisLabel: { color: "#cbd5e1" },
          axisLine: { lineStyle: { color: "#64748b" } },
          splitLine: { lineStyle: { color: "rgba(255,255,255,0.08)" } }
        },
        zAxis3D: {
          type: "value",
          name: "Count",
          min: 0,
          nameTextStyle: { color: "#e2e8f0" },
          axisLabel: { color: "#cbd5e1" },
          axisLine: { lineStyle: { color: "#64748b" } },
          splitLine: { lineStyle: { color: "rgba(255,255,255,0.08)" } }
        },
        grid3D: {
          boxWidth: 120,
          boxDepth: 90,
          axisPointer: { show: false },
          viewControl: {
            projection: "perspective",
            autoRotate: false,
            alpha: 22,
            beta: 38,
            distance: 210,
            minDistance: 120,
            maxDistance: 400
          },
          light: {
            main: { intensity: 1.2, shadow: false },
            ambient: { intensity: 0.55 }
          }
        },
        series: [
          {
            type: "bar3D",
            data: data,
            shading: "lambert",
            bevelSize: 0,
            minHeight: 0,
            barSize: Math.max(Math.min(xStep, yStep) * 0.9, 1),
            itemStyle: {
              opacity: 0.98
            },
            label: {
              show: false
            }
          }
        ]
      });
    }

    function applyRainflowPayload(payload) {
      if (!payload || !payload.channels) return;

      latestRainflowPayload = payload;
      rainflowElapsedText.textContent = formatElapsed(payload.elapsed_seconds);

      for (const key of CHANNEL_KEYS) {
        renderRainflowChart(key, payload.channels[key]);
      }
    }

    async function loadHistory() {
      try {
        const resp = await fetch(API_BASE + "/history", { cache: "no-store" });
        if (!resp.ok) return;

        const snapshot = await resp.json();
        if (!snapshot || !snapshot.run_id) return;

        switchToRun({
          run_id: snapshot.run_id,
          run_started_at: snapshot.run_started_at,
          file_name: snapshot.file_name,
          updated_at: snapshot.latest?.updated_at || snapshot.run_started_at,
          unit: snapshot.latest?.unit || "µε",
          vex_value: snapshot.latest?.vex_value
        });

        for (const point of snapshot.points || []) {
          applyPayload(point);
        }
      } catch (e) {
        console.error("History load failed", e);
      }
    }

    async function loadRainflowLatest() {
      try {
        const resp = await fetch(API_BASE + "/rainflow/latest", { cache: "no-store" });
        if (!resp.ok) return;

        const payload = await resp.json();
        if (!payload) return;

        applyRainflowPayload(payload);
      } catch (e) {
        console.error("Rainflow load failed", e);
      }
    }

    setInterval(() => {
      if (!lastUpdatedAtMs) return;

      const currentAge = Math.max(0, Math.round((Date.now() - lastUpdatedAtMs) / 1000));
      ageSec.textContent = String(currentAge);

      if (currentAge <= 10) setStatus("LIVE", "ok");
      else if (currentAge <= 30) setStatus("STALE", "");
      else setStatus("OFFLINE", "bad");
    }, 1000);

    window.addEventListener("resize", () => {
      for (const key of CHANNEL_KEYS) {
        const chart = rainflowCharts[key];
        if (chart) chart.resize();
      }
    });

    async function start() {
      for (const key of CHANNEL_KEYS) {
        makeCard(key);
        makeRainflowCard(key);
      }

      await loadHistory();
      await loadRainflowLatest();

      const ws = new WebSocket(WS_URL);

      ws.onopen = () => setStatus("CONNECTED", "ok");
      ws.onclose = () => setStatus("CLOSED", "bad");
      ws.onerror = () => setStatus("ERROR", "bad");

      ws.onmessage = (e) => {
        let msg;
        try {
          msg = JSON.parse(e.data);
        } catch {
          return;
        }

        const payload = msg.data || null;
        if (!payload) return;

        if (msg.type === "reset" || payload.reset === true) {
          switchToRun(payload);
          setStatus("NEW RUN", "ok");
          return;
        }

        if (msg.type === "rainflow") {
          applyRainflowPayload(payload);
          return;
        }

        applyPayload(payload);
        setStatus("LIVE", "ok");
      };
    }

    start();
  </script>
</body>
