<!doctype html>
<html lang="uk">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>NI Strain Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <style>
    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
    }

    body {
      padding: 10px;
    }

    .app {
      display: grid;
      grid-template-rows: auto auto 1fr;
      gap: 10px;
      min-height: calc(100vh - 20px);
    }

    h1 {
      margin: 0;
      font-size: 22px;
      line-height: 1.2;
    }

    .status-bar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.08);
      font-weight: 700;
      font-size: 13px;
    }

    .dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: #fbbf24;
    }

    .ok { background: #22c55e; }
    .bad { background: #ef4444; }

    .charts {
      min-height: 0;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    .card {
      min-height: 0;
      display: grid;
      grid-template-rows: auto auto 1fr auto;
      background: #1e293b;
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 12px;
      padding: 10px;
      height: 350px;
    }

    .chart-title {
      margin: 0 0 6px 0;
      font-size: 18px;
      line-height: 1.2;
    }

    .stats {
      margin: 0 0 6px 0;
      color: #94a3b8;
      font-size: 12px;
      line-height: 1.3;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .canvas-wrap {
      min-height: 0;
      position: relative;
    }

    .canvas-wrap canvas {
      width: 100% !important;
      height: 100% !important;
      display: block;
    }

    .card-actions {
      margin-top: 8px;
      display: flex;
      justify-content: flex-end;
    }

    .download-btn {
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.12);
      color: #e2e8f0;
      border-radius: 8px;
      padding: 6px 10px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
    }

    .download-btn:hover {
      background: rgba(255,255,255,.12);
    }

    @media (max-width: 1400px) {
      .charts {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 900px) {
      .charts {
        grid-template-columns: 1fr;
      }

      .card {
        height: 320px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <h1>NI Strain Dashboard</h1>

    <div class="status-bar">
      <div class="pill">
        <span id="dot" class="dot"></span>
        <span id="statusText">CONNECTING...</span>
      </div>
      <div class="pill">Run: <span id="runIdText">--</span></div>
      <div class="pill">File: <span id="fileNameText">--</span></div>
      <div class="pill">Unit: <span id="unitText">µε</span></div>
      <div class="pill">Vex: <span id="vexText">--</span> V</div>
      <div class="pill">Updated: <span id="updatedAt">--</span></div>
      <div class="pill">Age: <span id="ageSec">--</span>s</div>
    </div>

    <div class="charts" id="charts"></div>
  </div>

  <script>
    const API_BASE = "https://ni-live-monitor.yanovichvitaliy.workers.dev";
    const WS_URL = "wss://ni-live-monitor.yanovichvitaliy.workers.dev/ws";
    const MAX_POINTS = 1000;
    const CHANNEL_KEYS = ["ai0", "ai1", "ai2", "ai3"];

    const dot = document.getElementById("dot");
    const statusText = document.getElementById("statusText");
    const runIdText = document.getElementById("runIdText");
    const fileNameText = document.getElementById("fileNameText");
    const unitText = document.getElementById("unitText");
    const vexText = document.getElementById("vexText");
    const updatedAt = document.getElementById("updatedAt");
    const ageSec = document.getElementById("ageSec");
    const chartsEl = document.getElementById("charts");

    let activeRunId = null;
    let runStartMs = null;
    let lastUpdatedAtMs = null;

    const statsEls = {};
    const charts = {};

    function setStatus(text, mode) {
      statusText.textContent = text;
      dot.className = "dot " + (mode === "ok" ? "ok" : mode === "bad" ? "bad" : "");
    }

    function fmt(value) {
      const n = Number(value);
      return Number.isFinite(n) ? n.toFixed(3) : "--";
    }

    function downloadTextFile(filename, content, contentType = "text/csv;charset=utf-8;") {
      const blob = new Blob([content], { type: contentType });
      const url = URL.createObjectURL(blob);

      const a = document.createElement("a");
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      a.remove();

      URL.revokeObjectURL(url);
    }

    function buildWideCsv() {
      const meanSeries = {};

      for (const key of CHANNEL_KEYS) {
        const chart = charts[key];
        meanSeries[key] = chart ? chart.data.datasets[2].data : [];
      }

      const timeMap = new Map();

      for (const key of CHANNEL_KEYS) {
        for (const point of meanSeries[key]) {
          if (!point || !Number.isFinite(point.x)) continue;

          const t = Number(point.x).toFixed(3);

          if (!timeMap.has(t)) {
            timeMap.set(t, {
              t,
              ai0: "",
              ai1: "",
              ai2: "",
              ai3: ""
            });
          }

          timeMap.get(t)[key] = Number(point.y).toFixed(3);
        }
      }

      const rows = [];
      rows.push(["t", "ai0", "ai1", "ai2", "ai3"]);

      const sorted = Array.from(timeMap.values()).sort((a, b) => Number(a.t) - Number(b.t));

      for (const row of sorted) {
        rows.push([row.t, row.ai0, row.ai1, row.ai2, row.ai3]);
      }

      return rows.map(row => row.join(";")).join("\n");
    }

    function downloadWideCsv() {
      const csv = buildWideCsv();
      const runId = activeRunId || "no_run";
      downloadTextFile(`strain_${runId}.csv`, csv);
    }

    function makeCard(channelKey) {
      const upper = channelKey.toUpperCase();

      const card = document.createElement("div");
      card.className = "card";

      const title = document.createElement("h2");
      title.className = "chart-title";
      title.textContent = upper;

      const stats = document.createElement("div");
      stats.className = "stats";
      stats.id = `stats-${channelKey}`;
      stats.textContent = "mean -- | min -- | max --";

      const wrap = document.createElement("div");
      wrap.className = "canvas-wrap";

      const canvas = document.createElement("canvas");
      canvas.id = `chart-${channelKey}`;

      wrap.appendChild(canvas);

      const actions = document.createElement("div");
      actions.className = "card-actions";

      const button = document.createElement("button");
      button.type = "button";
      button.className = "download-btn";
      button.textContent = "Download";
      button.addEventListener("click", downloadWideCsv);

      actions.appendChild(button);

      card.appendChild(title);
      card.appendChild(stats);
      card.appendChild(wrap);
      card.appendChild(actions);
      chartsEl.appendChild(card);

      statsEls[channelKey] = stats;
      charts[channelKey] = makeChart(canvas.id, upper);
    }

    function makeChart(canvasId, label) {
      const ctx = document.getElementById(canvasId).getContext("2d");

      return new Chart(ctx, {
        type: "line",
        data: {
          datasets: [
            {
              label: label + " max area",
              data: [],
              borderColor: "rgba(239,68,68,0)",
              backgroundColor: "rgba(239,68,68,0.20)",
              pointRadius: 0,
              fill: { target: 2 }
            },
            {
              label: label + " max",
              data: [],
              borderColor: "rgba(239,68,68,0.85)",
              backgroundColor: "rgba(239,68,68,0.85)",
              pointRadius: 0,
              tension: 0.15,
              fill: false
            },
            {
              label: label + " mean",
              data: [],
              borderColor: "#22c55e",
              backgroundColor: "#22c55e",
              pointRadius: 2,
              tension: 0.15,
              fill: false
            },
            {
              label: label + " min area",
              data: [],
              borderColor: "rgba(59,130,246,0)",
              backgroundColor: "rgba(59,130,246,0.20)",
              pointRadius: 0,
              fill: { target: 2 }
            },
            {
              label: label + " min",
              data: [],
              borderColor: "rgba(59,130,246,0.85)",
              backgroundColor: "rgba(59,130,246,0.85)",
              pointRadius: 0,
              tension: 0.15,
              fill: false
            }
          ]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          animation: false,
          parsing: false,
          normalized: true,
          scales: {
            x: {
              type: "linear",
              title: { display: true, text: "t (s)" },
              ticks: { color: "#cbd5e1", maxTicksLimit: 6 },
              grid: { color: "rgba(255,255,255,0.08)" }
            },
            y: {
              title: { display: true, text: "µε" },
              ticks: { color: "#cbd5e1", maxTicksLimit: 6 },
              grid: { color: "rgba(255,255,255,0.08)" }
            }
          },
          plugins: {
            legend: {
              labels: { color: "#e2e8f0", boxWidth: 12, font: { size: 11 } }
            }
          }
        }
      });
    }

    function clearChart(chart) {
      chart.data.datasets.forEach(ds => ds.data = []);
      chart.update("none");
    }

    function clearAllCharts() {
      for (const key of CHANNEL_KEYS) {
        clearChart(charts[key]);
      }
    }

    function resetStatsText() {
      for (const key of CHANNEL_KEYS) {
        statsEls[key].textContent = "mean -- | min -- | max --";
      }
    }

    function switchToRun(payload) {
      activeRunId = payload.run_id || null;
      runStartMs = payload.run_started_at ? Date.parse(payload.run_started_at) : null;

      runIdText.textContent = activeRunId || "--";
      fileNameText.textContent = payload.file_name || "--";
      unitText.textContent = payload.unit || "µε";
      vexText.textContent = Number.isFinite(Number(payload.vex_value)) ? String(payload.vex_value) : "--";
      updatedAt.textContent = payload.updated_at || "--";
      ageSec.textContent = "0";
      lastUpdatedAtMs = null;

      clearAllCharts();
      resetStatsText();
    }

    function appendPoint(chart, x, mean, min, max) {
      const dsMaxArea = chart.data.datasets[0].data;
      const dsMaxLine = chart.data.datasets[1].data;
      const dsMean = chart.data.datasets[2].data;
      const dsMinArea = chart.data.datasets[3].data;
      const dsMinLine = chart.data.datasets[4].data;

      const lastMean = dsMean.length ? dsMean[dsMean.length - 1] : null;
      if (lastMean && lastMean.x === x) return;

      dsMaxArea.push({ x, y: max });
      dsMaxLine.push({ x, y: max });
      dsMean.push({ x, y: mean });
      dsMinArea.push({ x, y: min });
      dsMinLine.push({ x, y: min });

      if (dsMean.length > MAX_POINTS) {
        dsMaxArea.splice(0, dsMaxArea.length - MAX_POINTS);
        dsMaxLine.splice(0, dsMaxLine.length - MAX_POINTS);
        dsMean.splice(0, dsMean.length - MAX_POINTS);
        dsMinArea.splice(0, dsMinArea.length - MAX_POINTS);
        dsMinLine.splice(0, dsMinLine.length - MAX_POINTS);
      }

      chart.update("none");
    }

    function applyPayload(payload) {
      if (!payload || !payload.channels) return;

      if (!activeRunId || payload.run_id !== activeRunId) {
        switchToRun(payload);
      }

      if (!runStartMs && payload.run_started_at) {
        runStartMs = Date.parse(payload.run_started_at);
      }

      const ts = payload._received_at || payload.updated_at || null;
      if (!ts) return;

      const ms = Date.parse(ts);
      if (!Number.isFinite(ms)) return;

      lastUpdatedAtMs = ms;
      updatedAt.textContent = ts;
      runIdText.textContent = payload.run_id || "--";
      fileNameText.textContent = payload.file_name || "--";
      unitText.textContent = payload.unit || "µε";
      vexText.textContent = Number.isFinite(Number(payload.vex_value)) ? String(payload.vex_value) : "--";

      const x = runStartMs ? ((ms - runStartMs) / 1000.0) : (ms / 1000.0);

      for (const key of CHANNEL_KEYS) {
        const channel = payload.channels[key];
        if (!channel) continue;

        const gfText = Number.isFinite(Number(channel.gage_factor))
          ? ` | k ${fmt(channel.gage_factor)}`
          : "";

        statsEls[key].textContent =
          `mean ${fmt(channel.mean)} | min ${fmt(channel.min)} | max ${fmt(channel.max)}${gfText}`;

        appendPoint(
          charts[key],
          x,
          Number(channel.mean),
          Number(channel.min),
          Number(channel.max)
        );
      }
    }

    async function loadHistory() {
      try {
        const resp = await fetch(API_BASE + "/history", { cache: "no-store" });
        if (!resp.ok) return;

        const snapshot = await resp.json();
        if (!snapshot || !snapshot.run_id) return;

        switchToRun({
          run_id: snapshot.run_id,
          run_started_at: snapshot.run_started_at,
          file_name: snapshot.file_name,
          updated_at: snapshot.latest?.updated_at || snapshot.run_started_at,
          unit: snapshot.latest?.unit || "µε",
          vex_value: snapshot.latest?.vex_value
        });

        for (const point of snapshot.points || []) {
          applyPayload(point);
        }
      } catch (e) {
        console.error("History load failed", e);
      }
    }

    setInterval(() => {
      if (!lastUpdatedAtMs) return;

      const currentAge = Math.max(0, Math.round((Date.now() - lastUpdatedAtMs) / 1000));
      ageSec.textContent = String(currentAge);

      if (currentAge <= 10) setStatus("LIVE", "ok");
      else if (currentAge <= 30) setStatus("STALE", "");
      else setStatus("OFFLINE", "bad");
    }, 1000);

    async function start() {
      for (const key of CHANNEL_KEYS) {
        makeCard(key);
      }

      await loadHistory();

      const ws = new WebSocket(WS_URL);

      ws.onopen = () => setStatus("CONNECTED", "ok");
      ws.onclose = () => setStatus("CLOSED", "bad");
      ws.onerror = () => setStatus("ERROR", "bad");

      ws.onmessage = (e) => {
        let msg;
        try {
          msg = JSON.parse(e.data);
        } catch {
          return;
        }

        const payload = msg.data || null;
        if (!payload) return;

        if (msg.type === "reset" || payload.reset === true) {
          switchToRun(payload);
          setStatus("NEW RUN", "ok");
          return;
        }

        applyPayload(payload);
        setStatus("LIVE", "ok");
      };
    }

    start();
  </script>
</body>
</html>
