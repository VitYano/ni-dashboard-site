<!doctype html>
<html lang="uk">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>NI Live Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <style>
    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
    }

    body { padding: 10px; }

    .app {
      height: calc(100vh - 20px);
      display: grid;
      grid-template-rows: auto auto 1fr;
      gap: 10px;
    }

    h1 {
      margin: 0;
      font-size: 22px;
      line-height: 1.2;
    }

    .status-bar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.08);
      font-weight: 700;
      font-size: 13px;
    }

    .pill a {
      color: #e2e8f0;
      text-decoration: none;
    }

    .dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: #fbbf24;
    }

    .ok { background: #22c55e; }
    .bad { background: #ef4444; }

    .charts {
      min-height: 0;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .card {
      min-height: 0;
      display: grid;
      grid-template-rows: auto auto 1fr;
      background: #1e293b;
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 12px;
      padding: 10px;
    }

    .chart-title {
      margin: 0 0 6px 0;
      font-size: 18px;
      line-height: 1.2;
    }

    .stats {
      margin: 0 0 6px 0;
      color: #94a3b8;
      font-size: 12px;
      line-height: 1.3;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .canvas-wrap {
      min-height: 0;
      position: relative;
    }

    .canvas-wrap canvas {
      width: 100% !important;
      height: 100% !important;
      display: block;
    }

    @media (max-width: 900px) {
      html, body { overflow: auto; }
      .app { height: auto; }
      .charts { grid-template-columns: 1fr; }
      .card { height: 280px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <h1>NI Live Dashboard</h1>

    <div class="status-bar">
      <div class="pill"><span id="dot" class="dot"></span><span id="statusText">CONNECTING...</span></div>
      <div class="pill">Run: <span id="runIdText">--</span></div>
      <div class="pill">File: <span id="fileNameText">--</span></div>
      <div class="pill">Updated: <span id="updatedAt">--</span></div>
      <div class="pill">Age: <span id="ageSec">--</span>s</div>
      <div class="pill"><a id="rawDownloadLink" href="#" target="_blank">Скачати сирий файл</a></div>
    </div>

    <div class="charts">
      <div class="card">
        <h2 class="chart-title">AI0</h2>
        <div class="stats" id="stats0">mean -- | min -- | max --</div>
        <div class="canvas-wrap"><canvas id="chart0"></canvas></div>
      </div>

      <div class="card">
        <h2 class="chart-title">AI1</h2>
        <div class="stats" id="stats1">mean -- | min -- | max --</div>
        <div class="canvas-wrap"><canvas id="chart1"></canvas></div>
      </div>

      <div class="card">
        <h2 class="chart-title">AI2</h2>
        <div class="stats" id="stats2">mean -- | min -- | max --</div>
        <div class="canvas-wrap"><canvas id="chart2"></canvas></div>
      </div>
    </div>
  </div>

<script>
  const API_BASE = "https://ni-live-monitor.yanovichvitaliy.workers.dev";
  const WS_URL = "wss://ni-live-monitor.yanovichvitaliy.workers.dev/ws";
  const MAX_POINTS = 1000;

  const dot = document.getElementById("dot");
  const statusText = document.getElementById("statusText");
  const runIdText = document.getElementById("runIdText");
  const fileNameText = document.getElementById("fileNameText");
  const updatedAt = document.getElementById("updatedAt");
  const ageSec = document.getElementById("ageSec");
  const rawDownloadLink = document.getElementById("rawDownloadLink");

  const stats0 = document.getElementById("stats0");
  const stats1 = document.getElementById("stats1");
  const stats2 = document.getElementById("stats2");

  let activeRunId = null;
  let runStartMs = null;
  let lastUpdatedAtMs = null;

  function setStatus(text, mode) {
    statusText.textContent = text;
    dot.className = "dot " + (mode === "ok" ? "ok" : mode === "bad" ? "bad" : "");
  }

  function fmt(value) {
    const n = Number(value);
    return Number.isFinite(n) ? n.toFixed(5) : "--";
  }

  function updateRawLink(runId, fileName) {
    if (!runId || !fileName) {
      rawDownloadLink.href = "#";
      return;
    }

    rawDownloadLink.href =
      `${API_BASE}/download/${encodeURIComponent(runId)}/${encodeURIComponent(fileName)}`;
  }

  function makeChart(canvasId, label) {
    const ctx = document.getElementById(canvasId).getContext("2d");

    return new Chart(ctx, {
      type: "line",
      data: {
        datasets: [
          {
            label: label + " max",
            data: [],
            borderColor: "rgba(0,0,0,0)",
            pointRadius: 0,
            fill: false
          },
          {
            label: label + " min",
            data: [],
            borderColor: "rgba(0,0,0,0)",
            backgroundColor: "rgba(34,197,94,0.18)",
            pointRadius: 0,
            fill: "-1"
          },
          {
            label: label + " mean",
            data: [],
            borderColor: "#22c55e",
            backgroundColor: "#22c55e",
            pointRadius: 2,
            tension: 0.15,
            fill: false
          }
        ]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        animation: false,
        parsing: false,
        normalized: true,
        scales: {
          x: {
            type: "linear",
            title: { display: true, text: "t (s)" },
            ticks: { color: "#cbd5e1", maxTicksLimit: 6 },
            grid: { color: "rgba(255,255,255,0.08)" }
          },
          y: {
            title: { display: true, text: "V" },
            ticks: { color: "#cbd5e1", maxTicksLimit: 6 },
            grid: { color: "rgba(255,255,255,0.08)" }
          }
        },
        plugins: {
          legend: {
            labels: { color: "#e2e8f0", boxWidth: 12, font: { size: 11 } }
          }
        }
      }
    });
  }

  const chart0 = makeChart("chart0", "AI0");
  const chart1 = makeChart("chart1", "AI1");
  const chart2 = makeChart("chart2", "AI2");

  function clearChart(chart) {
    chart.data.datasets.forEach(ds => ds.data = []);
    chart.update("none");
  }

  function clearAllCharts() {
    clearChart(chart0);
    clearChart(chart1);
    clearChart(chart2);
  }

  function resetStatsText() {
    stats0.textContent = "mean -- | min -- | max --";
    stats1.textContent = "mean -- | min -- | max --";
    stats2.textContent = "mean -- | min -- | max --";
  }

  function switchToRun(payload) {
    activeRunId = payload.run_id || null;
    runStartMs = payload.run_started_at ? Date.parse(payload.run_started_at) : null;

    runIdText.textContent = activeRunId || "--";
    fileNameText.textContent = payload.file_name || "--";
    updatedAt.textContent = payload.updated_at || "--";
    ageSec.textContent = "0";
    lastUpdatedAtMs = null;

    updateRawLink(payload.run_id, payload.file_name);

    clearAllCharts();
    resetStatsText();
  }

  function appendPoint(chart, x, mean, min, max) {
    const dsMax = chart.data.datasets[0].data;
    const dsMin = chart.data.datasets[1].data;
    const dsMean = chart.data.datasets[2].data;

    const lastMean = dsMean.length ? dsMean[dsMean.length - 1] : null;
    if (lastMean && lastMean.x === x) return;

    dsMax.push({ x, y: max });
    dsMin.push({ x, y: min });
    dsMean.push({ x, y: mean });

    if (dsMean.length > MAX_POINTS) {
      dsMax.splice(0, dsMax.length - MAX_POINTS);
      dsMin.splice(0, dsMin.length - MAX_POINTS);
      dsMean.splice(0, dsMean.length - MAX_POINTS);
    }

    chart.update("none");
  }

  function applyPayload(payload) {
    if (!payload || !payload.channels) return;

    if (!activeRunId || payload.run_id !== activeRunId) {
      switchToRun(payload);
    }

    if (!runStartMs && payload.run_started_at) {
      runStartMs = Date.parse(payload.run_started_at);
    }

    const ts = payload._received_at || payload.updated_at || null;
    if (!ts) return;

    const ms = Date.parse(ts);
    if (!Number.isFinite(ms)) return;

    lastUpdatedAtMs = ms;
    updatedAt.textContent = ts;

    runIdText.textContent = payload.run_id || "--";
    fileNameText.textContent = payload.file_name || "--";
    updateRawLink(payload.run_id, payload.file_name);

    const c0 = payload.channels.ai0;
    const c1 = payload.channels.ai1;
    const c2 = payload.channels.ai2;

    stats0.textContent = `mean ${fmt(c0.mean)} | min ${fmt(c0.min)} | max ${fmt(c0.max)}`;
    stats1.textContent = `mean ${fmt(c1.mean)} | min ${fmt(c1.min)} | max ${fmt(c1.max)}`;
    stats2.textContent = `mean ${fmt(c2.mean)} | min ${fmt(c2.min)} | max ${fmt(c2.max)}`;

    const x = runStartMs ? ((ms - runStartMs) / 1000.0) : (ms / 1000.0);

    appendPoint(chart0, x, Number(c0.mean), Number(c0.min), Number(c0.max));
    appendPoint(chart1, x, Number(c1.mean), Number(c1.min), Number(c1.max));
    appendPoint(chart2, x, Number(c2.mean), Number(c2.min), Number(c2.max));
  }

  async function loadHistory() {
    try {
      const resp = await fetch(API_BASE + "/history", { cache: "no-store" });
      if (!resp.ok) return;

      const snapshot = await resp.json();
      if (!snapshot || !snapshot.run_id) return;

      switchToRun({
        run_id: snapshot.run_id,
        run_started_at: snapshot.run_started_at,
        file_name: snapshot.file_name,
        updated_at: snapshot.latest?.updated_at || snapshot.run_started_at,
      });

      for (const point of snapshot.points || []) {
        applyPayload(point);
      }
    } catch (e) {
      console.error("History load failed", e);
    }
  }

  setInterval(() => {
    if (!lastUpdatedAtMs) return;

    const currentAge = Math.max(0, Math.round((Date.now() - lastUpdatedAtMs) / 1000));
    ageSec.textContent = String(currentAge);

    if (currentAge <= 10) setStatus("LIVE", "ok");
    else if (currentAge <= 30) setStatus("STALE", "");
    else setStatus("OFFLINE", "bad");
  }, 1000);

  async function start() {
    await loadHistory();

    const ws = new WebSocket(WS_URL);

    ws.onopen = () => setStatus("CONNECTED", "ok");
    ws.onclose = () => setStatus("CLOSED", "bad");
    ws.onerror = () => setStatus("ERROR", "bad");

    ws.onmessage = (e) => {
      let msg;
      try {
        msg = JSON.parse(e.data);
      } catch {
        return;
      }

      const payload = msg.data || null;
      if (!payload) return;

      if (msg.type === "reset" || payload.reset === true) {
        switchToRun(payload);
        setStatus("NEW RUN", "ok");
        return;
      }

      applyPayload(payload);
      setStatus("LIVE", "ok");
    };
  }

  start();
</script>
</body>
</html>
